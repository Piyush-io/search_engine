[build]
rustflags = [
    "-C", "target-cpu=native",
]

[env]
# CUDA libraries path
LD_LIBRARY_PATH = "/usr/local/cuda-12.6/targets/x86_64-linux/lib:/home/hail/.local/lib/cudnn:/home/hail/.cache/ort.pyke.io/dfbin/x86_64-unknown-linux-gnu/6A14FDE80317F61BCACC6E06FBBF7F609BAEF7FC82BED979D8FE1C4012012247/onnxruntime/lib"
# ONNX Runtime shared library (downloaded by the ort crate at build time)
ORT_DYLIB_PATH = "/home/hail/.cache/ort.pyke.io/dfbin/x86_64-unknown-linux-gnu/6A14FDE80317F61BCACC6E06FBBF7F609BAEF7FC82BED979D8FE1C4012012247/onnxruntime/lib/libonnxruntime.so"

[alias]
run-opt = "run --release"
crawl-opt = "run --release --bin crawl"
embed-opt = "run --release --bin embed"
index-opt = "run --release --bin index"
lexical-index-opt = "run --release --bin lexical_index"
serve-opt = "run --release"
stats-opt = "run --release --bin stats"
bench-opt = "run --release --bin bench"
merge-opt = "run --release --bin merge_db"
clear-embeddings-opt = "run --release --bin clear_embeddings"
