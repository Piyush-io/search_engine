[crawl]
max_pages = 50_000
concurrency = 36
rate_limit_ms = 350

[embedding]
backend = "fastembed"       # Pure CPU — faster than CoreML for this small model (partial graph fallback hurts)
model = "all-minilm-l6-v2"  # fp32 (unquantized) - M2 NEON SIMD handles this natively, often faster than int8
dim = 384
batch_size = 32             # Match inner ONNX batch size — avoids overhead of multiple serial inner calls
max_length = 128
bulk_workers = 1            # Parallel ORT sessions for embed binary (2 sessions × 4 threads on M2)
bulk_intra_threads = 8      # Intra-op threads per bulk session

[hnsw]
backend = "hnsw"           # "hnsw" | "bruteforce"
shards = 1
m = 16
ef_construction = 200
ef_search = 80
max_elements = 2_000_000

[chunking]
context_depth = 3          # how many heading levels to prepend

[rocksdb]
block_cache_mb = 256

[server]
port = 3000

[paths]
db_path = "./crawl_data"
index_path = "./hnsw_index.bin"
lexical_index_path = "./lexical_index"
wiki_index_path = "./wiki_hnsw.bin"
