[crawl]
max_pages = 50_000
concurrency = 36
rate_limit_ms = 350

[embedding]
backend = "auto"            # Auto-detect: CoreML on macOS, CUDA on Windows/Linux w/ NVIDIA, CPU otherwise
model = "bge-small-en-v1.5"
dim = 384
batch_size = 32
max_length = 512
bulk_workers = 1
bulk_intra_threads = 8

[hnsw]
backend = "hnsw"
shards = 1
m = 16
ef_construction = 200
ef_search = 200
max_elements = 4_000_000

[chunking]
context_depth = 3
window_size = 3
window_overlap = 1

[rocksdb]
block_cache_mb = 256

[server]
port = 3000

[paths]
db_path = "./crawl_data"
index_path = "./hnsw_index.bin"
lexical_index_path = "./lexical_index"
wiki_index_path = "./wiki_hnsw.bin"
