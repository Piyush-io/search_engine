[crawl]
max_pages = 2_000_000
concurrency = 200
rate_limit_ms = 100

[embedding]
backend = "cuda"            # GTX 1660 SUPER — use CUDA EP directly
model = "bge-small-en-v1.5"
dim = 384
batch_size = 256            # Safe default for 6GB VRAM
max_length = 256
bulk_workers = 1            # Single worker to avoid OOM
bulk_intra_threads = 4      # Utilize more CPU for pre/post processing

[hnsw]
backend = "hnsw"
shards = 1
m = 16
ef_construction = 200       # quality-first default for better ANN recall during build
ef_search = 200
max_elements = 10_000_000

[chunking]
context_depth = 3
window_size = 3
window_overlap = 1

[rocksdb]
block_cache_mb = 256

[server]
port = 3000

[paths]
db_path = "./crawl_data"
index_path = "./hnsw_index.bin"
lexical_index_path = "./lexical_index"
wiki_index_path = "./wiki_hnsw.bin"
